name: Build cPanel ZIP on release

# Trigger: push a version tag like v1.0.0  →  builds a deployable ZIP and
# publishes it as a GitHub Release asset.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:        # also allow manual runs from the Actions tab

permissions:
  contents: write           # required to create a Release + upload the asset

jobs:
  release-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build deployable ZIP (cPanel-ready)
        run: |
          VERSION="${GITHUB_REF_NAME:-manual}"
          ZIP="$RUNNER_TEMP/quizjeto-${VERSION}.zip"

          # Zip the project CONTENTS (so it extracts straight into public_html).
          # Includes .htaccess + database/.htaccess (dotfiles).
          # Excludes VCS/CI, secrets, and local-only data.
          zip -r "$ZIP" . \
            -x '.git/*' \
            -x '.github/*' \
            -x '.env' \
            -x '*.sqlite' '*.sqlite-journal' '*.db' \
            -x '*.log' \
            -x '*.DS_Store'

          echo "ZIP_PATH=$ZIP" >> "$GITHUB_ENV"
          echo "Built:"
          unzip -l "$ZIP" | tail -n +2 | head -40

      - name: Publish Release with the ZIP attached
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" "${ZIP_PATH}" \
            --title "QuizJeto ${GITHUB_REF_NAME}" \
            --generate-notes

      - name: Upload ZIP as artifact (for manual runs without a tag)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: quizjeto-zip
          path: ${{ env.ZIP_PATH }}
